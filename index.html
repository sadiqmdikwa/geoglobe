<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>GeoGlobe | Sadiq Muhammad Mustapha</title>
    
    <link rel="icon" type="image/png" href="https://lh3.googleusercontent.com/d/1PYQ705DpgwDPAV7kERrpa8a0m8hFdq5w" />
    <link rel="apple-touch-icon" href="https://lh3.googleusercontent.com/d/1PYQ705DpgwDPAV7kERrpa8a0m8hFdq5w" />

    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        geoCyan: '#42C2CB',
                        geoYellow: '#F4D03F',
                        geoDark: '#0f172a',
                    },
                    fontFamily: {
                        sans: ['Inter', 'ui-sans-serif', 'system-ui', '-apple-system', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        
        /* Fixed: Ensures the React app container is visible */
        #content {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .drawer-transition {
            transition: transform 0.3s ease-in-out;
        }
        
        header {
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        /* Increased Icon Size Logic */
        .nav-logo-icon {
            width: 45px; /* Increased size */
            height: 45px;
            object-contain: contain;
            border-radius: 8px;
        }

        /* Logo Animation */
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        .animate-float {
            animation: float 3s ease-in-out infinite;
        }

        /* GeoGlobe Text Style */
        .geoglobe-text {
            font-family: 'Times New Roman', serif;
            -webkit-text-stroke: 0.1px #F4D03F;
            text-shadow: 0.3px 0.3px 0px rgba(244, 208, 63, 0.15);
        }

        #drawer-backdrop {
            transition: opacity 0.3s ease-in-out;
            pointer-events: none;
        }
        #drawer-backdrop.active {
            opacity: 1;
            pointer-events: auto;
        }
        .drawer-link {
            opacity: 0;
            transform: translateX(20px);
            transition: all 0.4s ease-out;
        }
        #mobile-drawer.open .drawer-link {
            opacity: 1;
            transform: translateX(0);
        }
    </style>
</head>
<body class="bg-geoDark text-white min-h-screen font-sans">
    
    <main id="content">
        </main>

    <script type="module" src="/src/main.tsx"></script>

    <script>
      if (window.netlifyIdentity) {
        window.netlifyIdentity.on("init", user => {
          if (!user) {
            window.netlifyIdentity.on("login", () => {
              document.location.href = "/admin/";
            });
          }
        });
      }
    </script>
</body>
</html>

site_url: https://geoglobe-web.sadeeqmuhammad2320.workers.dev
backend:
  name: git-gateway
  branch: main

media_folder: "public/images"
public_folder: "/images"

collections:
  - name: "videos"
    label: "Video Library"
    folder: "src/content/videos"
    create: true
    slug: "{{title}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "YouTube URL", name: "url", widget: "string" }
      - { label: "Category", name: "category", widget: "select", options: ["Border Mystery", "Country Fact", "Map Animation"] }

  - name: "game"
    label: "Geography Quiz"
    folder: "src/content/quiz"
    create: true
    fields:
      - { label: "Country Name", name: "name", widget: "string" }
      - { label: "Clue/Hint", name: "clue", widget: "text" }
      - { label: "Fact", name: "fact", widget: "string" }
